apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-jcasc-config
  namespace: horizon-relevance-dev
data:
  00-ldap-and-auth.yaml: |
    jenkins:
      securityRealm:
        ldap:
          configurations:
            - server: "ldap://openldap.horizon-relevance-dev.svc.cluster.local:389"
              rootDN: "dc=horizonrelevance,dc=local"
              inhibitInferRootDN: true
              ignoreIfUnavailable: true

              # Manager bind for LDAP searches.
              managerDN: "cn=admin,dc=horizonrelevance,dc=local"
              managerPasswordSecret: "${LDAP_MANAGER_PASSWORD}"

              # Users can log in with uid or email.
              userSearchBase: "ou=users"
              userSearch: "(|(uid={0})(mail={0}))"
              displayNameAttributeName: "cn"
              mailAddressAttributeName: "mail"

              # OpenLDAP groups are groupOfNames entries under ou=groups.
              groupSearchBase: "ou=groups"
              groupMembershipStrategy:
                fromGroupSearch:
                  filter: "(member={0})"

          disableMailAddressResolver: false
          userIdStrategy: caseInsensitive
          groupIdStrategy: caseInsensitive

      authorizationStrategy:
        roleBased:
          roles:
            global:
              - name: "admin"
                permissions:
                  - "Overall/Administer"
                  - "Job/Build"
                  - "Job/Read"
                  - "Credentials/View"
                entries:
                  - user: "ankur.kashyap"
                  - group: "admins"
              - name: "authenticated-read"
                permissions:
                  - "Overall/Read"
                  - "View/Read"
                  - "Job/Read"
                entries:
                  - group: "authenticated"

    unclassified:
      location:
        url: "https://horizonrelevance.com/jenkins"
      globalLibraries:
        libraries:
          - name: "jenkins-shared-library"
            defaultVersion: "main"
            implicit: false
            allowVersionOverride: true
            includeInChangesets: true
            retriever:
              modernSCM:
                scm:
                  git:
                    remote: "https://github.com/ankur1825/jenkins-shared-library.git"
