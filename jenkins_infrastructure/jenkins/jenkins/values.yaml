namespaceOverride: horizon-relevance-dev
replicaCount: 1

image:
  repository: ankur1825/horizon-jenkins
  tag: "1.0.7"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# serviceAccount:
#   create: false
#   automount: false
#   name: ""
serviceAccount:
  create: true          # let Helm create the SA
  name: jenkins         # or leave empty to use the chart fullname
  automount: true       # needed so kubectl/helm can auth
  annotations: {}

rbac:
  create: true
  # You can append extra rules if your jobs need them
  additionalRules: []   # e.g. [{apiGroups:[""], resources:["persistentvolumeclaims"], verbs:["*"]}]

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0
  fsGroupChangePolicy: "Always"

securityContext:
  runAsUser: 0
  allowPrivilegeEscalation: true

initContainers:
  - name: volume-permission-fix
    image: busybox
    command: ["sh","-c","chmod -R 777 /var/jenkins_home"]
    volumeMounts:
      - name: jenkins-home
        mountPath: /var/jenkins_home

  - name: remove-ldap-init-groovy
    image: busybox
    command: ["sh","-lc","rm -f /var/jenkins_home/init.groovy.d/*.groovy || true"]
    volumeMounts:
      - name: jenkins-home
        mountPath: /var/jenkins_home

  - name: install-sonar-scanner
    image: alpine:3.20
    command:
      - sh
      - -lc
      - |
        set -e
        apk add --no-cache curl unzip
        mkdir -p /var/jenkins_home/tools
        cd /var/jenkins_home/tools
        if [ ! -x sonar-scanner/bin/sonar-scanner ]; then
          curl -fsSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip -oq sonar-scanner.zip
          rm -rf sonar-scanner
          mv sonar-scanner-5.0.1.3006-linux sonar-scanner
          rm -f sonar-scanner.zip
        fi
        chmod +x sonar-scanner/bin/sonar-scanner
    volumeMounts:
      - name: jenkins-home
        mountPath: /var/jenkins_home


