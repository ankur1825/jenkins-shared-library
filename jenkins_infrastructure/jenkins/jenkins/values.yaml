service:
  type: ClusterIP
  port: 8080

# ingress:
#   enabled: true
#   className: nginx
#   annotations:
#     nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
#     nginx.ingress.kubernetes.io/proxy-set-headers: "horizon-relevance-dev/jenkins-proxy-headers"
#     nginx.ingress.kubernetes.io/proxy-cookie-path: "/ /jenkins"
#     nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
#     nginx.ingress.kubernetes.io/proxy-buffers: "8 16k"
#   hosts:
#     - host: horizonrelevance.com
#       paths:
#         - path: /jenkins
#           pathType: Prefix  
#   tls:
#     - hosts:
#       - horizonrelevance.com
#       secretName: jenkins-tls         

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /jenkins/$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP" 
  hosts:
    - host: horizonrelevance.com
      paths:
        - path: /jenkins(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - hosts:
      - horizonrelevance.com
      secretName: jenkins-tls         

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 4Gi

livenessProbe:
  httpGet:
    path: /jenkins/login
    port: 8080
  initialDelaySeconds: 120
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

readinessProbe:
  httpGet:
    path: /jenkins/login
    port: 8080
  initialDelaySeconds: 120
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

startupProbe:
  httpGet:
    path: /jenkins/login
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 60

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes:
  - name: jenkins-home
    persistentVolumeClaim:
      claimName: jenkins-home
  - name: jcasc-config-volume
    configMap:
      name: jenkins-jcasc-config
  # - name: ldap-init-volume
  #   configMap:
  #     name: ldap-init-script   
  - name: docker-graph-storage
    emptyDir: {}
  - name: disable-ref-init          
    emptyDir: {}   

volumeMounts:
  - name: jenkins-home
    mountPath: /var/jenkins_home
  - name: jcasc-config-volume
    mountPath: /var/jenkins_home/casc_configs
    readOnly: true
  - name: disable-ref-init          
    mountPath: /usr/share/jenkins/ref/init.groovy.d
    readOnly: true  
  # - name: ldap-init-volume
  #   mountPath: /opt/bootstrap/ldap-init.d
  #   #mountPath: /var/jenkins_home/init.groovy.d
  #   readOnly: true  

extraContainers:
  - name: dind
    image: docker:dind
    securityContext:
      privileged: true
    volumeMounts:
      - name: docker-graph-storage
        mountPath: /var/lib/docker
    ports:
      - containerPort: 2375
    env:
      - name: DOCKER_TLS_CERTDIR
        value: ""

controller:
  jenkinsOpts: --prefix=/jenkins
  jenkinsUriPrefix: /jenkins
  jenkinsUrlProtocol: https
  jenkinsUrl: https://horizonrelevance.com/jenkins
  javaOpts: ""
  #javaOpts: >
  #  -Djenkins.model.Jenkins.instance.setRootUrl=https://horizonrelevance.com/jenkins

  containerEnv:
    - name: LDAP_MANAGER_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-ldap
          key: password
    - name: SONAR_HOST_URL
      value: http://sonarqube.horizon-relevance-dev.svc.cluster.local:9000/sonarqube
    - name: SONAR_TOKEN
      valueFrom:
        secretKeyRef:
          name: sonarqube-jenkins-token
          key: token
          optional: true
    - name: CASC_JENKINS_CONFIG
      value: /var/jenkins_home/casc_configs
      #value: /var/jenkins_home/casc_configs/ldap-auth.yaml
    - name: DOCKER_HOST
      value: "tcp://localhost:2375"

persistence:
  enabled: true
  storageClass: gp3
  accessMode: ReadWriteOnce
  size: 10Gi
