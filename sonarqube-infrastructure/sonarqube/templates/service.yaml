apiVersion: v1
kind: Service
metadata:
  name: {{ include "sonarqube.fullname" . }}
  namespace: {{ .Values.namespaceOverride }}
  labels:
    {{- include "sonarqube.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "sonarqube.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
